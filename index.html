<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>3대 운동 1RM 계산기</title>

<style>
body{
    font-family: Arial;
    background:#f2f4f7;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:30px;
    width:350px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
}

input,select,button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:6px;
    border:1px solid #ccc;
}

button{
    background:#4CAF50;
    color:white;
    font-weight:bold;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#43a047;
}

.result{
    margin-top:20px;
    font-size:18px;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<h1>3대 운동 1RM 계산기</h1>

<label>운동 선택</label>
<select id="exercise">
<option value="bench">벤치프레스</option>
<option value="squat">스쿼트</option>
<option value="deadlift">데드리프트</option>
</select>

<label>체중 (kg)</label>
<input type="number" id="bodyweight" placeholder="예: 70">

<label>중량 (kg)</label>
<input type="number" id="weight" placeholder="예: 80">

<label>반복 횟수</label>
<input type="number" id="reps" placeholder="예: 5">

<button onclick="calculate()">계산하기</button>

<div class="result" id="result"></div>

</div>

<script>

function calculate(){

let exercise = document.getElementById("exercise").value;
let bodyweight = parseFloat(document.getElementById("bodyweight").value);
let weight = parseFloat(document.getElementById("weight").value);
let reps = parseFloat(document.getElementById("reps").value);

if(!bodyweight || !weight || !reps){
document.getElementById("result").innerText="모든 값을 입력해주세요.";
return;
}

let oneRM = weight * (1 + reps/30);

let ratio = oneRM / bodyweight;

let percentile="";
let level="";

if(exercise=="bench"){

if(ratio < 0.75){
percentile="하위 80%";
level="Beginner";
}
else if(ratio < 1.0){
percentile="상위 50%";
level="Intermediate";
}
else if(ratio < 1.5){
percentile="상위 20%";
level="Advanced";
}
else{
percentile="상위 5%";
level="Elite";
}

}

if(exercise=="squat"){

if(ratio < 1.25){
percentile="하위 80%";
level="Beginner";
}
else if(ratio < 1.75){
percentile="상위 50%";
level="Intermediate";
}
else if(ratio < 2.25){
percentile="상위 20%";
level="Advanced";
}
else{
percentile="상위 5%";
level="Elite";
}

}

if(exercise=="deadlift"){

if(ratio < 1.5){
percentile="하위 80%";
level="Beginner";
}
else if(ratio < 2.0){
percentile="상위 50%";
level="Intermediate";
}
else if(ratio < 2.75){
percentile="상위 20%";
level="Advanced";
}
else{
percentile="상위 5%";
level="Elite";
}

}

document.getElementById("result").innerHTML=

"예상 1RM: " + oneRM.toFixed(1) + " kg <br><br>" +
"체중 대비 비율: " + ratio.toFixed(2) + " x BW <br><br>" +
"수준: " + level + "<br>" +
"대략 " + percentile + " 수준";

}

</script>

</body>
</html>
