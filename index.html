<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IRON 1RM CALCULATOR</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="background-overlay"></div>

<div class="container">
    <header>
        <h1>IRON STRENGTH</h1>
        <p class="subtitle">UNLEASH YOUR POTENTIAL</p>
    </header>

    <div class="input-group">
        <label>LIFT TYPE</label>
        <select id="exercise">
            <option value="bench">BENCH PRESS</option>
            <option value="squat">SQUAT</option>
            <option value="deadlift">DEADLIFT</option>
        </select>
    </div>

    <div class="input-group">
        <label>BODYWEIGHT (KG)</label>
        <input type="number" id="bodyweight" placeholder="75">
    </div>

    <div class="input-group">
        <label>LIFT WEIGHT (KG)</label>
        <input type="number" id="weight" placeholder="100">
    </div>

    <div class="input-group">
        <label>REPS PERFORMED</label>
        <input type="number" id="reps" placeholder="1" value="1">
    </div>

    <button onclick="calculate()">MEASURE POWER</button>

    <div id="result" class="result">
        <!-- Results will be injected here via JS -->
    </div>
    
    <div class="disclaimer">
        * Based on general strength standards relative to bodyweight.
    </div>
</div>

<script src="main.js"></script>

</body>
</html>
